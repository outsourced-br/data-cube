name: publish-packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ./Outsourced.DataCube.sln

      - name: Build
        run: dotnet build ./Outsourced.DataCube.sln -c Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test ./Outsourced.DataCube.sln -c Release --no-build -p:ContinuousIntegrationBuild=true --collect:"XPlat Code Coverage" --results-directory ./artifacts/TestResults/coverage

      - name: Pack
        run: dotnet pack ./Outsourced.DataCube.sln -c Release --no-build -p:ContinuousIntegrationBuild=true

      - name: Configure GitHub Packages source
        run: dotnet nuget add source --username "$GITHUB_ACTOR" --password "${{ secrets.GITHUB_TOKEN }}" --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Publish packages
        shell: bash
        run: |
          shopt -s nullglob
          packages=(./artifacts/packages/*.nupkg)

          if [ ${#packages[@]} -eq 0 ]; then
            echo "No packages were produced."
            exit 1
          fi

          for package in "${packages[@]}"; do
            dotnet nuget push "$package" \
              --source github \
              --api-key "${{ secrets.GITHUB_TOKEN }}" \
              --skip-duplicate \
              --no-symbols
          done
